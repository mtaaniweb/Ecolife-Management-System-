<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecolife System | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#060D06;
  --bg-card:#0C160C;
  --bg-input:#0F1A0F;
  --green:#00E676;
  --green-dim:#00C853;
  --green-glow:rgba(0,230,118,0.15);
  --green-border:rgba(0,230,118,0.25);
  --gold:#C9A84C;
  --gold-light:#E8C97A;
  --white:#E8F5E9;
  --gray:#6B8F71;
  --text:#C8E6C9;
  --error:#FF5252;
}

html,body{height:100%}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  position:relative;overflow:hidden;
}

/* dark luxury background gradients */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(0,230,118,0.06) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 85%,rgba(0,200,83,0.08) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 50%,rgba(6,13,6,0.95) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}

/* subtle grid texture */
body::after{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,230,118,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

.card{
  background:var(--bg-card);
  border-radius:16px;width:100%;max-width:420px;
  overflow:hidden;
  border:1px solid var(--green-border);
  box-shadow:0 0 40px rgba(0,230,118,0.08),0 24px 64px rgba(0,0,0,0.6);
  position:relative;z-index:1;
}

.card-top{
  background:linear-gradient(160deg,#0A1A0A 0%,#061206 100%);
  padding:36px 36px 28px;text-align:center;
  border-bottom:1px solid var(--green-border);
  position:relative;overflow:hidden;
}

/* top glow accent */
.card-top::before{
  content:'';position:absolute;
  top:-40px;left:50%;transform:translateX(-50%);
  width:200px;height:80px;
  background:radial-gradient(ellipse,rgba(0,230,118,0.12) 0%,transparent 70%);
  pointer-events:none;
}

.card-top img{
  width:72px;height:72px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(0,230,118,0.35);
  margin:0 auto 18px;display:block;
  box-shadow:0 0 20px rgba(0,230,118,0.2);
  position:relative;z-index:1;
}

.card-top h1{
  font-family:'Montserrat',sans-serif;font-size:19px;font-weight:800;
  color:var(--white);letter-spacing:0.08em;margin-bottom:6px;
  position:relative;z-index:1;
}

.card-top p{
  font-size:11px;color:var(--gray);
  letter-spacing:0.14em;text-transform:uppercase;font-weight:600;
  position:relative;z-index:1;
}

.card-body{padding:32px 36px 28px}

.form-label{
  display:block;font-size:11px;font-weight:700;
  color:var(--green-dim);letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:8px;
}

.form-group{margin-bottom:20px}

.input-wrap{position:relative}

.input-wrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;stroke:var(--gray);fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  pointer-events:none;transition:stroke 0.2s;
}

input[type="email"],input[type="password"]{
  width:100%;padding:13px 14px 13px 42px;
  border:1.5px solid rgba(0,230,118,0.15);
  border-radius:8px;
  font-family:'Inter',sans-serif;font-size:14px;
  color:var(--text);
  background:var(--bg-input);
  transition:border-color 0.2s,box-shadow 0.2s;
  outline:none;-webkit-appearance:none;
}

input[type="email"]::placeholder,input[type="password"]::placeholder{
  color:rgba(107,143,113,0.5);
}

input[type="email"]:focus,input[type="password"]:focus{
  border-color:var(--green-dim);
  box-shadow:0 0 0 3px rgba(0,200,83,0.1);
}

input[type="email"]:focus ~ svg,
input[type="password"]:focus ~ svg{
  stroke:var(--green-dim);
}

.pw-wrap{position:relative}

.pw-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:0;
  display:flex;align-items:center;color:var(--gray);
}

.pw-toggle svg{
  width:17px;height:17px;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
}

.error-msg{
  display:none;
  background:rgba(255,82,82,0.08);
  border:1px solid rgba(255,82,82,0.25);
  border-radius:8px;padding:12px 14px;
  font-size:14px;color:var(--error);
  margin-bottom:20px;line-height:1.5;
}
.error-msg.show{display:block}

.btn-login{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#00C853 0%,#00A846 100%);
  color:#050D05;
  font-family:'Montserrat',sans-serif;font-weight:800;
  font-size:14px;letter-spacing:0.06em;
  border:none;border-radius:8px;cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 20px rgba(0,200,83,0.25);
  text-transform:uppercase;
}

.btn-login:hover:not(:disabled){
  background:linear-gradient(135deg,#00E676 0%,#00C853 100%);
  box-shadow:0 6px 28px rgba(0,230,118,0.35);
  transform:translateY(-1px);
}

.btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.spinner{
  display:none;width:17px;height:17px;
  border:2px solid rgba(5,13,5,0.3);
  border-top-color:#050D05;
  border-radius:50%;animation:spin 0.7s linear infinite;
}

.btn-login.loading .spinner{display:block}
.btn-login.loading .btn-text{opacity:0.8}

@keyframes spin{to{transform:rotate(360deg)}}

.card-footer{padding:20px 36px 28px;text-align:center}

.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,var(--green-border),transparent);
  margin-bottom:20px;
}

.card-footer p{
  font-size:11.5px;color:var(--gray);line-height:1.7;
  letter-spacing:0.02em;
}

@media(max-width:480px){
  .card-body{padding:28px 24px 20px}
  .card-top{padding:28px 24px 22px}
  .card-footer{padding:16px 24px 24px}
}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <img src="https://res.cloudinary.com/hztm3zo8/image/upload/v1782422764/FB_IMG_1781877214514_qq7dt6.jpg" alt="Ecolife Logo">
    <h1>ECOLIFE SYSTEM</h1>
    <p>Operations Platform</p>
  </div>

  <div class="card-body">
    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="pw-wrap">
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <button class="pw-toggle" id="pwToggle" type="button">
          <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" type="button">
      <div class="spinner"></div>
      <span class="btn-text">Sign In</span>
    </button>
  </div>

  <div class="card-footer">
    <div class="divider"></div>
    <p>Access is restricted to authorised Ecolife staff only.<br>Contact your admin if you need access.</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, collection, getDocs }   from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxi76PxDat-G5bjcUQ2MmPe0mGcTE-izs",
    authDomain: "ecolife-system-ff2d6.firebaseapp.com",
    databaseURL: "https://ecolife-system-ff2d6-default-rtdb.firebaseio.com",
    projectId: "ecolife-system-ff2d6",
    storageBucket: "ecolife-system-ff2d6.firebasestorage.app",
    messagingSenderId: "421807560122",
    appId: "1:421807560122:web:877a49223b03ba4a477983"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const ADMIN_EMAIL = 'ecolifepestguard@gmail.com';

  document.getElementById('pwToggle').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const isPassword = pw.type === 'password';
    pw.type = isPassword ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = isPassword
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
  });

  function showError(msg){
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearError(){
    document.getElementById('errorMsg').classList.remove('show');
  }

  function setLoading(state){
    const btn = document.getElementById('loginBtn');
    btn.disabled = state;
    btn.classList.toggle('loading', state);
    document.querySelector('.btn-text').textContent = state ? 'Signing in...' : 'Sign In';
  }

  function getFriendlyError(code){
    switch(code){
      case 'auth/user-not-found':
      case 'auth/wrong-password':
      case 'auth/invalid-credential': return 'Incorrect email or password. Please try again.';
      case 'auth/invalid-email':       return 'Please enter a valid email address.';
      case 'auth/too-many-requests':   return 'Too many failed attempts. Please wait a few minutes and try again.';
      case 'auth/network-request-failed': return 'No internet connection. Please check your network and try again.';
      default: return 'Something went wrong. Please try again.';
    }
  }

  async function redirectByRole(user){
    if(user.email === ADMIN_EMAIL){
      window.location.href = 'dashboard.html';
      return;
    }
    try{
      const snap = await getDocs(collection(db, 'technicians'));
      let isTech = false;
      snap.forEach(doc => { if(doc.data().email === user.email) isTech = true; });
      window.location.href = isTech ? 'technician-view.html' : 'dashboard.html';
    } catch(e){
      window.location.href = 'dashboard.html';
    }
  }

  document.getElementById('loginBtn').addEventListener('click', async () => {
    clearError();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if(!email)    { showError('Please enter your email address.'); return; }
    if(!password) { showError('Please enter your password.'); return; }
    setLoading(true);
    try{
      const result = await signInWithEmailAndPassword(auth, email, password);
      await redirectByRole(result.user);
    } catch(err){
      showError(getFriendlyError(err.code));
      setLoading(false);
    }
  });

  ['email','password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if(e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  });
</script>
</body>
</html>
